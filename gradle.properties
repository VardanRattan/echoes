# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx1G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Fabric Properties
minecraft_version=1.21.1
yarn_mappings=1.21.1+build.3
loader_version=0.16.5
loom_version=1.15-SNAPSHOT

# Mod Properties
# Semantic version for the mod artifact.
# Keep in sync with CHANGELOG.md and fabric.mod.json.
mod_version=0.1.0-beta
maven_group=com.vardanrattan.echoes
archives_base_name=echoes

# Dependencies
# Fabric API version matching the minecraft_version above.
fabric_api_version=0.102.0+1.21.1